<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #222;
      color: white;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .album {
      padding: 15px;
      margin: 10px 0;
      background: white;
      cursor: pointer;
      border: 1px solid #ddd;
    }

    .album:hover {
      background: #f0f0f0;
    }

    .gallery {
      display: none;
    }

    .images {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .images img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .back {
      margin-bottom: 15px;
      cursor: pointer;
      color: blue;
    }
  </style>
</head>
<body>

<header>
  <h1>My Portfolio</h1>
</header>

<div class="container">
  <!-- Album List -->
  <div id="albums"></div>

  <!-- Gallery View -->
  <div id="galleryView" class="gallery">
    <div class="back" onclick="goBack()">← Back</div>
    <h2 id="albumTitle"></h2>
    <div class="images" id="imageContainer"></div>
  </div>
</div>

<script>
  // === EDIT THIS PART ONLY ===
  const albums = {
    "Nature": [
      "images/nature/photo1.jpg",
      "images/nature/photo2.jpg",
      "images/nature/photo3.jpg"
    ],
    "City": [
      "images/city/photo1.jpg",
      "images/city/photo2.jpg"
    ]
  };
  // ==========================

  const albumContainer = document.getElementById('albums');
  const galleryView = document.getElementById('galleryView');
  const imageContainer = document.getElementById('imageContainer');
  const albumTitle = document.getElementById('albumTitle');

  // Generate album list automatically
  for (let name in albums) {
    const div = document.createElement('div');
    div.className = 'album';
    div.textContent = name;
    div.onclick = () => openAlbum(name);
    albumContainer.appendChild(div);
  }

  function openAlbum(name) {
    albumContainer.style.display = 'none';
    galleryView.style.display = 'block';
    albumTitle.textContent = name;

    imageContainer.innerHTML = '';

    albums[name].forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      imageContainer.appendChild(img);
    });
  }

  function goBack() {
    galleryView.style.display = 'none';
    albumContainer.style.display = 'block';
  }
</script>

</body>
</html>
